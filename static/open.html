<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft-Email-Manager 公开邮件页面</title>
    <link rel="icon" type="image/png" href="/static/assets/logo.png?v=20260406">
    <link rel="shortcut icon" type="image/png" href="/static/assets/logo.png?v=20260406">
    <style>
        :root {
            --bg: #eef4ff;
            --bg-accent: #dbeafe;
            --card: rgba(255, 255, 255, 0.88);
            --line: rgba(148, 163, 184, 0.28);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #0f766e;
            --primary-strong: #115e59;
            --danger: #b91c1c;
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.16), transparent 34%),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.14), transparent 28%),
                linear-gradient(180deg, var(--bg), #f8fafc 52%, #ffffff 100%);
            min-height: 100vh;
        }

        body.unavailable-mode .page-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding-block: 24px;
        }

        body.password-gate-mode .page-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding-block: 24px;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .page-shell {
            max-width: 1380px;
            margin: 0 auto;
            padding: 28px 20px 56px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.8fr);
            gap: 18px;
            margin-bottom: 18px;
        }

        .hero-card,
        .card,
        .gate-card,
        .empty-card,
        .modal-panel {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.78);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
        }

        .hero-card {
            padding: 26px;
        }

        .hero-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .hero-mark {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #0f766e, #0ea5e9);
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .brand-logo {
            position: relative;
            width: 92px;
            height: 92px;
            border-radius: 28px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.88);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .brand-logo-image {
            width: 64px;
            height: 64px;
            object-fit: contain;
            display: block;
        }

        .brand-logo-mark {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #0f766e;
        }

        .brand-logo:not(.is-placeholder) .brand-logo-mark {
            display: none;
        }

        .brand-logo-sm {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.14);
        }

        .brand-logo-sm .brand-logo-image {
            width: 34px;
            height: 34px;
        }

        .brand-logo-sm .brand-logo-mark {
            font-size: 16px;
        }

        .hero h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
        }

        .hero p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            color: #0f172a;
            font-size: 13px;
        }

        .chip strong {
            font-weight: 600;
        }

        .hero-side {
            padding: 22px;
            display: grid;
            gap: 14px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.68;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #0891b2);
            color: #fff;
            box-shadow: 0 16px 28px rgba(15, 118, 110, 0.22);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.84);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .stat-card {
            padding: 18px 18px 16px;
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
        }

        .card {
            padding: 20px;
            margin-bottom: 18px;
        }

        .input,
        .select,
        .filter-select,
        .search-input {
            width: 100%;
            min-height: 46px;
            border-radius: 14px;
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
        }

        .input,
        .select,
        .filter-select {
            padding: 0 14px;
        }

        .input:focus,
        .select:focus,
        .filter-select:focus,
        .search-input:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.4);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-container,
        .filter-container {
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            background: rgba(245, 247, 251, 0.78);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .search-container {
            width: 56px;
            height: 56px;
            min-height: 56px;
            margin: 0 auto 18px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            overflow: hidden;
            border-radius: 999px;
            background: transparent;
            box-shadow: none;
            transition: width 0.36s cubic-bezier(0.22, 1, 0.36, 1), padding 0.36s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease, border-color 0.28s ease;
        }

        .search-container.is-expanded {
            width: min(100%, 720px);
            padding: 8px 16px 8px 8px;
            justify-content: flex-start;
            gap: 12px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .search-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            background: rgba(15, 118, 110, 0.1);
            color: var(--primary-strong);
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: none;
            line-height: 1;
            transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease, color 0.2s ease;
        }

        .email-search-toggle {
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            background: transparent;
            box-shadow: none;
            line-height: 1;
            border-radius: 999px;
            transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), color 0.2s ease;
        }

        .search-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .email-search-input-wrap {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            align-self: center;
            min-height: 40px;
            transform: translateX(18px);
            transition: max-width 0.36s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.18s ease, transform 0.24s ease;
        }

        .search-container.is-expanded .email-search-input-wrap {
            max-width: 100%;
            flex: 1;
            opacity: 1;
            padding-right: 52px;
            transform: translateX(0);
            transition-delay: 0.12s, 0.12s, 0.12s;
        }

        .search-input {
            height: 40px;
            border: none;
            background: transparent;
            box-shadow: none;
            padding: 0;
            min-width: 0;
            text-align: center;
        }

        .search-input:focus {
            box-shadow: none;
        }

        .search-container .search-input::placeholder {
            color: transparent;
            transition: color 0.18s ease;
        }

        .search-container.is-expanded .search-input::placeholder {
            color: #94a3b8;
        }

        .filter-container {
            padding: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 168px;
            flex: 1 1 168px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .filter-group-range {
            flex: 0 0 0;
            min-width: 0;
            max-width: 0;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: flex-basis 0.34s cubic-bezier(0.22, 1, 0.36, 1), max-width 0.34s cubic-bezier(0.22, 1, 0.36, 1), max-height 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease, transform 0.26s ease;
        }

        .filter-group-range.is-active {
            flex: 1.4 1 320px;
            max-width: 420px;
            max-height: 120px;
            opacity: 1;
            transform: translateY(0);
        }

        .date-range-inputs {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 10px;
            align-items: center;
        }

        .date-range-separator {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        .filter-actions {
            width: 152px;
            min-width: 152px;
            flex: 0 0 152px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-inline: auto;
        }

        .filter-actions .btn {
            width: 100%;
        }

        select.filter-select {
            appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, #64748b 50%),
                linear-gradient(135deg, #64748b 50%, transparent 50%);
            background-position:
                calc(100% - 18px) calc(50% - 3px),
                calc(100% - 12px) calc(50% - 3px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
            padding-right: 38px;
        }

        .filter-date-input {
            padding-right: 14px;
        }

        .email-list {
            display: grid;
            gap: 12px;
        }

        .email-item {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 14px;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(255, 255, 255, 0.78);
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .email-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
            border-color: rgba(14, 165, 233, 0.26);
        }

        .email-item.unread {
            border-left: 4px solid #0ea5e9;
            padding-left: 12px;
        }

        .email-item.is-new-email {
            overflow: hidden;
            opacity: 0;
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            transform: translateY(-18px);
            transition:
                max-height 0.42s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.28s ease,
                transform 0.32s ease,
                padding 0.32s ease;
        }

        .email-item.is-new-email.is-entered {
            opacity: 1;
            max-height: 220px;
            padding-top: 16px;
            padding-bottom: 16px;
            transform: translateY(0);
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            overflow: hidden;
            background: #ffffff;
            color: #111111;
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
            display: grid;
            place-items: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .avatar.has-avatar {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            padding: 8%;
            box-sizing: border-box;
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
        }

        .email-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: start;
            margin-bottom: 8px;
        }

        .email-subject {
            font-size: 16px;
            font-weight: 600;
            word-break: break-word;
        }

        .email-date {
            color: var(--muted);
            white-space: nowrap;
            font-size: 13px;
        }

        .email-meta,
        .email-preview {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
        }

        .loading,
        .empty-card,
        .gate-card {
            padding: 32px 24px;
            text-align: center;
            color: var(--muted);
        }

        .gate-card,
        .empty-card {
            max-width: 520px;
            margin: 72px auto 0;
        }

        body.password-gate-mode .gate-card {
            margin: 0;
            width: min(100%, 520px);
        }

        .unavailable-card {
            width: min(82vw, 520px);
            aspect-ratio: 1 / 1;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            text-align: center;
        }

        .gate-card h2,
        .empty-card h2 {
            margin: 0 0 10px;
            color: var(--text);
        }

        .gate-form {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .turnstile-slot {
            display: grid;
            gap: 8px;
            min-height: 132px;
            justify-items: center;
            align-content: start;
            width: 100%;
            transition: opacity 0.2s ease, max-height 0.24s ease, min-height 0.24s ease;
        }

        .turnstile-slot.is-inactive {
            min-height: 0;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .turnstile-slot-shell {
            width: min(100%, 332px);
            min-height: 92px;
            border-radius: 16px;
            border: 1px dashed rgba(15, 118, 110, 0.28);
            background: rgba(248, 250, 252, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .turnstile-widget {
            width: 300px;
            max-width: 100%;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .turnstile-widget:empty::before {
            content: "安全验证加载中";
            display: inline-flex;
            width: 100%;
            min-height: 72px;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background:
                linear-gradient(90deg, rgba(226, 232, 240, 0.6) 0%, rgba(241, 245, 249, 0.96) 50%, rgba(226, 232, 240, 0.6) 100%);
            background-size: 220% 100%;
            color: rgba(100, 116, 139, 0.92);
            font-size: 13px;
            letter-spacing: 0.02em;
            animation: turnstileSkeleton 1.8s linear infinite;
        }

        .turnstile-hint {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        .turnstile-hint.is-error {
            color: var(--danger);
        }

        .gate-note {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
        }

        .error-text {
            color: var(--danger);
            min-height: 20px;
            font-size: 13px;
        }

        .hidden {
            display: none !important;
        }

        @keyframes turnstileSkeleton {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 220% 50%;
            }
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.48);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-panel {
            width: min(980px, 100%);
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 18px 22px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .modal-close {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: none;
            background: rgba(148, 163, 184, 0.16);
            cursor: pointer;
            color: var(--text);
            font-size: 20px;
        }

        .modal-body {
            padding: 22px;
            overflow: auto;
        }

        .detail-hero {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 16px;
            align-items: center;
            margin-bottom: 18px;
        }

        .detail-copy h4 {
            margin: 0 0 6px;
            font-size: 20px;
        }

        .detail-copy p {
            margin: 0;
            color: var(--muted);
            word-break: break-word;
        }

        .detail-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .detail-meta-item {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(248, 250, 252, 0.88);
            padding: 14px;
        }

        .detail-meta-item span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .detail-meta-item strong {
            display: block;
            word-break: break-word;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tab {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .tab.active {
            background: rgba(15, 118, 110, 0.12);
            border-color: rgba(15, 118, 110, 0.24);
            color: var(--primary-strong);
        }

        .content-panel {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: #fff;
            overflow: hidden;
        }

        .content-panel iframe {
            width: 100%;
            min-height: 420px;
            border: none;
            background: #fff;
        }

        .content-panel pre {
            margin: 0;
            padding: 18px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "SFMono-Regular", monospace;
            font-size: 13px;
            line-height: 1.7;
            background: #fff;
        }

        .raw-panel pre {
            background: #0f172a;
            color: #e2e8f0;
        }

        .notice {
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 980px) {
            .hero,
            .stats-grid,
            .detail-meta {
                grid-template-columns: 1fr;
            }

            .page-shell {
                padding: 18px 14px 40px;
            }

            .hero-card,
            .hero-side,
            .card {
                padding: 18px;
            }

            .email-row {
                flex-direction: column;
            }

            .search-container {
                width: 100%;
                min-height: 52px;
                margin-inline: 0;
                padding: 8px 14px;
            }

            .search-container,
            .search-container.is-expanded {
                width: 100%;
            }

            .email-search-input-wrap {
                max-width: 100%;
                flex: 1;
                opacity: 1;
                transform: none;
            }

            .search-container .search-input::placeholder {
                color: #94a3b8;
            }

            .filter-group,
            .filter-group-range,
            .filter-actions {
                width: 100%;
                min-width: 0;
                flex-basis: 100%;
            }

            .date-range-inputs {
                grid-template-columns: 1fr;
            }

            .date-range-separator {
                display: none;
            }

            .unavailable-card {
                width: min(100%, 420px);
                aspect-ratio: auto;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getTurnstileConfig(source = {}) {
            const config = source && typeof source === 'object' ? source : {};
            return {
                enabled: !!config.enabled,
                siteKey: String(config.site_key || '').trim(),
                adminLoginEnabled: !!config.admin_login_enabled,
                publicAccessEnabled: !!config.public_access_enabled
            };
        }

        function requiresAccessTurnstile(status = shareStatus) {
            const config = getTurnstileConfig(status && status.turnstile);
            return !!status && !!status.requires_password && config.enabled && config.publicAccessEnabled && !!config.siteKey;
        }

        function setAccessTurnstileHint(message = '', isError = false) {
            const hint = document.getElementById('accessTurnstileHint');
            if (!hint) return;
            hint.textContent = message;
            hint.classList.toggle('is-error', !!isError);
        }

        function toggleAccessTurnstileVisibility(status = shareStatus) {
            const wrap = document.getElementById('accessTurnstileWrap');
            if (!wrap) return;
            wrap.classList.toggle('is-inactive', !requiresAccessTurnstile(status));
            if (!requiresAccessTurnstile(status)) {
                setAccessTurnstileHint('');
            }
        }

        function resetAccessTurnstileWidget() {
            accessTurnstileToken = '';
            if (window.turnstile && accessTurnstileWidgetId !== null) {
                try {
                    window.turnstile.reset(accessTurnstileWidgetId);
                } catch (error) {
                    console.warn('Unable to reset public turnstile widget', error);
                }
            }
            if (requiresAccessTurnstile()) {
                setAccessTurnstileHint('请完成下方安全验证');
            }
        }

        function ensureTurnstileScript() {
            if (window.turnstile && typeof window.turnstile.render === 'function') {
                return Promise.resolve(window.turnstile);
            }
            if (accessTurnstileScriptPromise) {
                return accessTurnstileScriptPromise;
            }
            accessTurnstileScriptPromise = new Promise((resolve, reject) => {
                const existing = document.querySelector('script[data-turnstile-script="true"]');
                if (existing) {
                    existing.addEventListener('load', () => resolve(window.turnstile), { once: true });
                    existing.addEventListener('error', () => reject(new Error('Cloudflare Turnstile 脚本加载失败')), { once: true });
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
                script.async = true;
                script.defer = true;
                script.dataset.turnstileScript = 'true';
                script.onload = () => resolve(window.turnstile);
                script.onerror = () => reject(new Error('Cloudflare Turnstile 脚本加载失败'));
                document.head.appendChild(script);
            });
            return accessTurnstileScriptPromise;
        }

        async function ensureAccessTurnstileReady(status = shareStatus) {
            toggleAccessTurnstileVisibility(status);
            if (!requiresAccessTurnstile(status)) {
                accessTurnstileToken = '';
                return true;
            }

            const container = document.getElementById('accessTurnstileWidget');
            if (!container) {
                return false;
            }

            const config = getTurnstileConfig(status && status.turnstile);
            setAccessTurnstileHint('安全验证加载中...');

            try {
                await ensureTurnstileScript();
                if (!window.turnstile || typeof window.turnstile.render !== 'function') {
                    throw new Error('Cloudflare Turnstile 未正确加载');
                }

                if (accessTurnstileWidgetId !== null && accessTurnstileSiteKey === config.siteKey) {
                    setAccessTurnstileHint(accessTurnstileToken ? '验证已完成' : '请完成下方安全验证');
                    return true;
                }

                if (accessTurnstileWidgetId !== null && typeof window.turnstile.remove === 'function') {
                    try {
                        window.turnstile.remove(accessTurnstileWidgetId);
                    } catch (error) {
                        console.warn('Unable to remove public turnstile widget', error);
                    }
                }

                container.innerHTML = '';
                accessTurnstileToken = '';
                accessTurnstileSiteKey = config.siteKey;
                accessTurnstileWidgetId = window.turnstile.render(container, {
                    sitekey: config.siteKey,
                    theme: 'light',
                    callback: token => {
                        accessTurnstileToken = token;
                        setAccessTurnstileHint('验证已完成');
                    },
                    'expired-callback': () => {
                        accessTurnstileToken = '';
                        setAccessTurnstileHint('验证已过期，请重新完成', true);
                    },
                    'error-callback': () => {
                        accessTurnstileToken = '';
                        setAccessTurnstileHint('安全验证加载失败，请刷新后重试', true);
                    }
                });
                setAccessTurnstileHint('请完成下方安全验证');
                return true;
            } catch (error) {
                console.error('Failed to initialize public turnstile', error);
                setAccessTurnstileHint(error.message || 'Cloudflare Turnstile 初始化失败', true);
                return false;
            }
        }

        function getCurrentEmailIdFromPath() {
            const prefix = '/open/emails/';
            if (!window.location.pathname.startsWith(prefix)) {
                return '';
            }
            return decodeURIComponent(window.location.pathname.slice(prefix.length));
        }

        async function apiRequest(url, options = {}, allowPasswordPrompt = true) {
            const response = await fetch(API_BASE + url, {
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                },
                ...options
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                if (response.status === 401 && allowPasswordPrompt) {
                    showPasswordGate();
                }
                throw new Error(errorData.detail || `HTTP ${response.status}`);
            }

            return response.json();
        }

        function formatEmailDate(dateString) {
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return '未知时间';
            const now = new Date();
            const diffDays = Math.floor((now - date) / 86400000);
            if (diffDays === 0) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            if (diffDays === 1) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            if (diffDays < 7) {
                return `${diffDays}天前`;
            }
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getSenderProfile(fromValue) {
            const raw = fromValue || '';
            const emailMatch = raw.match(/<([^>]+)>/);
            const email = (emailMatch ? emailMatch[1] : raw).trim();
            const name = raw.replace(/<[^>]+>/g, '').replace(/"/g, '').trim();
            const displayName = name || email || '未知发件人';
            const initialSource = (displayName || email || '?').trim();
            const initial = initialSource ? initialSource.charAt(0).toUpperCase() : '?';
            return { email: email || raw || '未知发件人', displayName, initial };
        }

        function resolveSenderLogoUrl(emailAddress = '') {
            const normalizedEmail = String(emailAddress || '').trim().toLowerCase();
            const domain = normalizedEmail.includes('@') ? normalizedEmail.split('@').pop() : normalizedEmail;
            if (!domain) {
                return '';
            }

            const matchedRule = DOMAIN_LOGO_RULES.find(rule => rule.keywords.some(keyword => domain.includes(keyword)));
            if (matchedRule && matchedRule.asset) {
                return `/static/assets/icons/${encodeURIComponent(matchedRule.asset)}`;
            }

            return `/icons/domain/${encodeURIComponent(domain)}?size=128`;
        }

        function renderAvatar(email, sender) {
            const avatarUrl = resolveSenderLogoUrl(sender.email);
            const safeInitial = escapeHtml(email.sender_initial || sender.initial || '?');
            const safeAlt = escapeHtml(sender.displayName);
            const safeUrl = avatarUrl ? escapeHtml(avatarUrl) : '';
            const safeFallbackUrl = email.sender_avatar_url ? escapeHtml(email.sender_avatar_url) : '';
            const hasAvatar = Boolean(avatarUrl);
            const avatarClassName = hasAvatar ? 'avatar has-avatar' : 'avatar';
            const fallbackClass = hasAvatar ? 'avatar-fallback hidden' : 'avatar-fallback';
            const imageMarkup = hasAvatar
                ? `<img src="${safeUrl}" alt="${safeAlt}" loading="lazy" referrerpolicy="no-referrer" data-fallback-src="${safeFallbackUrl}" onerror="const fallbackUrl = this.getAttribute('data-fallback-src'); if (fallbackUrl && this.src !== fallbackUrl) { this.src = fallbackUrl; this.removeAttribute('data-fallback-src'); return; } this.remove(); const fallback = this.parentElement.querySelector('.avatar-fallback'); if (fallback) fallback.classList.remove('hidden');">`
                : '';

            return `<div class="${avatarClassName}">${imageMarkup}<span class="${fallbackClass}">${safeInitial}</span></div>`;
        }

        async function loadShareStatus() {
            return apiRequest('/api/open/emails/' + encodeURIComponent(currentEmailId) + '/status', {}, false);

        function showPasswordGate() {
            document.body.classList.add('password-gate-mode');
            document.body.classList.remove('unavailable-mode');
            document.getElementById('passwordGate').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');

            document.body.classList.remove('password-gate-mode');

            shareStatus = status;
            document.getElementById('currentEmailLabel').textContent = currentEmailId;
            document.getElementById('currentShareStatus').textContent = status.status === 'active' ? '公开中' : status.status;

        }

        async function initializePage() {
            currentEmailId = getCurrentEmailIdFromPath();
            if (!currentEmailId) {
                showUnavailable('公开页面地址不正确。');
                return;
            }

            try {
                const status = await loadShareStatus();
                updateShareHeader(status);
                if (status.requires_password && !status.access_granted) {
                    showPasswordGate();
                    return;
                }
                showAppView();
                syncEmailSearchState();
                toggleCustomDateRange();
                await loadEmails();
            } catch (error) {
                showUnavailable(error.message);
            }
        }

        async function submitAccessPassword(event) {
            event.preventDefault();
            const input = document.getElementById('accessPasswordInput');
            const errorElement = document.getElementById('accessPasswordError');
            const submitBtn = document.getElementById('unlockSubmitBtn');
            const password = input.value;

            errorElement.textContent = '';
            if (!password) {
                errorElement.textContent = '请输入访问密码';
                return;
            }

            const requiresTurnstile = requiresAccessTurnstile();
            if (requiresTurnstile) {
                const turnstileReady = await ensureAccessTurnstileReady();
                if (!turnstileReady) {
                    errorElement.textContent = 'Cloudflare Turnstile 加载失败，请刷新后重试';
                    return;
                }
                if (!accessTurnstileToken) {
                    errorElement.textContent = '请先完成 Cloudflare Turnstile 验证';
                    return;
                }
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '验证中...';
            const submittedWithTurnstile = requiresTurnstile && !!accessTurnstileToken;

            try {
                await apiRequest('/api/open/emails/' + encodeURIComponent(currentEmailId) + '/access', {
                    method: 'POST',
                    body: JSON.stringify({
                        password,
                        turnstile_token: submittedWithTurnstile ? accessTurnstileToken : ''
                    })
                }, false);
                input.value = '';
                await initializePage();
            } catch (error) {
                errorElement.textContent = error.message || '访问密码错误';
            } finally {
                if (submittedWithTurnstile) {
                    resetAccessTurnstileWidget();
                }
                submitBtn.disabled = false;
                submitBtn.textContent = '进入公开页面';
            }
        }

        async function loadEmails(forceRefresh = false) {
            const list = document.getElementById('emailsList');
            const refreshBtn = document.getElementById('refreshBtn');
            const hasExistingEmails = Array.isArray(allEmails) && allEmails.length > 0;
            const shouldProbeLatest = hasExistingEmails;
            if (!shouldProbeLatest) {
                list.innerHTML = '<div class="loading">正在加载邮件...</div>';
            }
            refreshBtn.disabled = true;
            refreshBtn.textContent = '加载中...';

            try {
                const refreshQuery = (forceRefresh || shouldProbeLatest) ? '&refresh=true' : '';
                const pageSize = shouldProbeLatest ? EMAIL_REFRESH_PROBE_SIZE : EMAIL_LIST_PAGE_SIZE;
                const data = await apiRequest('/api/open/emails/' + encodeURIComponent(currentEmailId) + '?folder=all&page=1&page_size=' + pageSize + refreshQuery);
                const fetchedEmails = data.emails || [];
                let insertedIds = [];
                if (shouldProbeLatest) {
                    insertedIds = getNewlyInsertedEmailIds(fetchedEmails, allEmails);
                    pendingInsertedEmailIds = insertedIds;
                    allEmails = mergeLatestEmails(fetchedEmails, allEmails, EMAIL_LIST_PAGE_SIZE);
                } else {
                    pendingInsertedEmailIds = [];
                    allEmails = fetchedEmails;
                }
                updateEmailStats(allEmails);
                document.getElementById('lastUpdateTime').textContent = new Date().toLocaleString();
                syncEmailSearchState();
                toggleCustomDateRange();
                applyFilters();
            } catch (error) {
                if (String(error.message || '').toLowerCase().includes('password')) {
                    showPasswordGate();
                    return;
                }
                if (!shouldProbeLatest) {
                    list.innerHTML = `<div class="loading">${escapeHtml(error.message)}</div>`;
                }
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新邮件';
            }
        }

        function updateEmailStats(emails) {
            const total = emails.length;
            const unread = emails.filter(item => !item.is_read).length;
            const today = emails.filter(item => {
                const emailDate = new Date(item.date);
                const todayDate = new Date();
                return emailDate.toDateString() === todayDate.toDateString();
            }).length;
            const attachments = emails.filter(item => item.has_attachments).length;

            document.getElementById('totalEmailCount').textContent = total;
            document.getElementById('unreadEmailCount').textContent = unread;
            document.getElementById('todayEmailCount').textContent = today;
            document.getElementById('attachmentEmailCount').textContent = attachments;
        }

        function mergeLatestEmails(latestEmails, existingEmails, maxItems = EMAIL_LIST_PAGE_SIZE) {
            const merged = [];
            const seen = new Set();
            [...latestEmails, ...existingEmails].forEach(email => {
                const messageId = String((email && email.message_id) || '');
                if (!messageId || seen.has(messageId)) return;
                seen.add(messageId);
                merged.push(email);
            });
            return merged.slice(0, maxItems);
        }

        function getNewlyInsertedEmailIds(latestEmails, existingEmails) {
            const existingIds = new Set((existingEmails || []).map(email => String((email && email.message_id) || '')));
            return (latestEmails || [])
                .map(email => String((email && email.message_id) || ''))
                .filter(messageId => messageId && !existingIds.has(messageId));
        }

        function animateInsertedEmailItems(root, messageIds = []) {
            const targetIds = new Set((messageIds || []).filter(Boolean));
            if (!root || !targetIds.size) return;

            const items = Array.from(root.querySelectorAll('.email-item')).filter(item => targetIds.has(item.dataset.messageId || ''));
            if (!items.length) return;

            items.forEach(item => item.classList.add('is-new-email'));
            requestAnimationFrame(() => {
                items.forEach(item => item.classList.add('is-entered'));
            });
            window.setTimeout(() => {
                items.forEach(item => item.classList.remove('is-new-email', 'is-entered'));
            }, 560);
        }

        function toggleCustomDateRange() {
            const timeFilter = document.getElementById('timeFilter');
            const rangeWrap = document.getElementById('customDateRange');
            if (!timeFilter || !rangeWrap) return;
            rangeWrap.classList.toggle('is-active', timeFilter.value === 'custom');
        }

        function toggleEmailSearch(forceExpand = null) {
            const searchShell = document.getElementById('emailSearchShell');
            const searchInput = document.getElementById('mailSearchInput');
            if (!searchShell || !searchInput) return;

            if (window.innerWidth <= 768) {
                searchShell.classList.add('is-expanded');
                return;
            }

            const shouldExpand = typeof forceExpand === 'boolean'
                ? forceExpand
                : !searchShell.classList.contains('is-expanded');

            searchShell.classList.toggle('is-expanded', shouldExpand);
            if (shouldExpand) {
                window.setTimeout(() => searchInput.focus(), 180);
            }
        }

        function handleEmailSearchBlur() {
            const searchShell = document.getElementById('emailSearchShell');
            const searchInput = document.getElementById('mailSearchInput');
            if (!searchShell || !searchInput || window.innerWidth <= 768) return;
            if (!searchInput.value.trim()) {
                searchShell.classList.remove('is-expanded');
            }
        }

        function syncEmailSearchState() {
            const searchShell = document.getElementById('emailSearchShell');
            const searchInput = document.getElementById('mailSearchInput');
            if (!searchShell || !searchInput) return;
            searchShell.classList.toggle('is-expanded', window.innerWidth <= 768 || !!searchInput.value.trim());
        }

        function applyFilters() {
            const searchTerm = document.getElementById('mailSearchInput').value.trim().toLowerCase();
            const folderFilter = document.getElementById('folderFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const timeFilter = document.getElementById('timeFilter').value;
            const attachmentFilter = document.getElementById('attachmentFilter').value;
            const dateFrom = document.getElementById('dateFromFilter').value;
            const dateTo = document.getElementById('dateToFilter').value;

            filteredEmails = allEmails.filter(email => {
                if (searchTerm) {
                    const searchable = `${email.subject || ''} ${email.from_email || ''}`.toLowerCase();
                    if (!searchable.includes(searchTerm)) {
                        return false;
                    }
                }

                if (folderFilter !== 'all' && String(email.folder || '').toLowerCase() !== folderFilter) {
                    return false;
                }

                if (statusFilter === 'read' && !email.is_read) return false;
                if (statusFilter === 'unread' && email.is_read) return false;
                if (attachmentFilter === 'with' && !email.has_attachments) return false;
                if (attachmentFilter === 'without' && email.has_attachments) return false;

                if (timeFilter !== 'all') {
                    const emailDate = new Date(email.date);
                    const now = new Date();
                    switch (timeFilter) {
                        case 'today':
                            if (emailDate.toDateString() !== now.toDateString()) return false;
                            break;
                        case '3days':
                        case '7days':
                        case '30days':
                        case '90days': {
                            const days = parseInt(timeFilter, 10);
                            const startDate = new Date(now.getTime() - days * 86400000);
                            if (emailDate < startDate) return false;
                            break;
                        }
                        case 'month':
                            if (emailDate.getFullYear() !== now.getFullYear() || emailDate.getMonth() !== now.getMonth()) {
                                return false;
                            }
                            break;
                        case 'custom': {
                            if (dateFrom) {
                                const fromDate = new Date(dateFrom + 'T00:00:00');
                                if (emailDate < fromDate) return false;
                            }
                            if (dateTo) {
                                const toDate = new Date(dateTo + 'T23:59:59.999');
                                if (emailDate > toDate) return false;
                            }
                            break;
                        }
                    }
                }

                return true;
            });

            renderFilteredEmails();
        }

        function clearFilters() {
            document.getElementById('mailSearchInput').value = '';
            document.getElementById('folderFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('timeFilter').value = 'all';
            document.getElementById('attachmentFilter').value = 'all';
            document.getElementById('dateFromFilter').value = '';
            document.getElementById('dateToFilter').value = '';
            toggleCustomDateRange();
            syncEmailSearchState();
            filteredEmails = [...allEmails];
            renderFilteredEmails();
        }

        function renderFilteredEmails() {
            const list = document.getElementById('emailsList');
            if (!filteredEmails.length) {
                list.innerHTML = '<div class="loading">没有找到匹配的邮件</div>';
                pendingInsertedEmailIds = [];
                return;
            }

            list.innerHTML = filteredEmails.map(email => {
                const sender = getSenderProfile(email.from_email);
                const messageId = encodeURIComponent(email.message_id || '');
                const attachmentLabel = email.has_attachments ? ' | 含附件' : '';
                const readLabel = email.is_read ? '已读' : '未读';
                return `
                    <article class="email-item ${email.is_read ? '' : 'unread'}" data-message-id="${escapeHtml(email.message_id || '')}" onclick="showEmailDetailByEncoded('${messageId}')">
                        ${renderAvatar(email, sender)}
                        <div>
                            <div class="email-row">
                                <div class="email-subject">${escapeHtml(email.subject || '(无主题)')}</div>
                                <div class="email-date">${escapeHtml(formatEmailDate(email.date))}</div>
                            </div>
                            <div class="email-meta">${escapeHtml(sender.email)}</div>
                            <div class="email-preview">文件夹：${escapeHtml(email.folder || '')} | ${escapeHtml(readLabel)}${escapeHtml(attachmentLabel)}</div>
                        </div>
                    </article>
                `;
            }).join('');
            animateInsertedEmailItems(list, pendingInsertedEmailIds);
            pendingInsertedEmailIds = [];
        }

        function closeEmailModal() {
            document.getElementById('emailModal').classList.add('hidden');
        }

        function showEmailDetailByEncoded(encodedMessageId) {
            showEmailDetail(decodeURIComponent(encodedMessageId));
        }

        async function showEmailDetail(messageId) {
            const modal = document.getElementById('emailModal');
            const modalTitle = document.getElementById('emailModalTitle');
            const modalContent = document.getElementById('emailModalContent');
            modal.classList.remove('hidden');
            modalTitle.textContent = '邮件详情';
            modalContent.innerHTML = '<div class="loading">正在加载邮件详情...</div>';

            try {
                const data = await apiRequest('/api/open/emails/' + encodeURIComponent(currentEmailId) + '/' + encodeURIComponent(messageId));
                const sender = getSenderProfile(data.from_email);
                modalTitle.textContent = data.subject || '(无主题)';
                modalContent.innerHTML = `
                    <div class="detail-hero">
                        ${renderAvatar(data, sender)}
                        <div class="detail-copy">
                            <h4>${escapeHtml(sender.displayName)}</h4>
                            <p>${escapeHtml(sender.email)}</p>
                        </div>
                    </div>
                    <div class="detail-meta">
                        <div class="detail-meta-item">
                            <span>收件人</span>
                            <strong>${escapeHtml(data.to_email || '')}</strong>
                        </div>
                        <div class="detail-meta-item">
                            <span>发送时间</span>
                            <strong>${escapeHtml(new Date(data.date).toLocaleString())}</strong>
                        </div>
                        <div class="detail-meta-item">
                            <span>邮件主题</span>
                            <strong>${escapeHtml(data.subject || '(无主题)')}</strong>
                        </div>
                        <div class="detail-meta-item">
                            <span>邮件 ID</span>
                            <strong>${escapeHtml(data.message_id || '')}</strong>
                        </div>
                    </div>
                    ${renderEmailContent(data)}
                `;

                const frame = document.getElementById('htmlContentFrame');
                if (frame && data.body_html) {
                    // 安全：邮件 HTML 攻击者可控。iframe 使用 sandbox 且【刻意不加 allow-scripts】，
                    // 脚本被浏览器禁用以阻断 XSS。切勿加入 allow-scripts（配合 allow-same-origin 等同完全 XSS）。
                    // 额外注入 CSP：禁脚本/对象/表单，只允许 data: 图片，阻断远程追踪像素。
                    const cspMeta = '<meta http-equiv="Content-Security-Policy" content="default-src \'none\'; img-src data:; style-src \'unsafe-inline\' data:; font-src data:; media-src data:; base-uri \'none\'; form-action \'none\'">';
                    frame.srcdoc = cspMeta + data.body_html;
                }
            } catch (error) {
                modalContent.innerHTML = `<div class="loading">${escapeHtml(error.message)}</div>`;
            }
        }

        function renderEmailContent(email) {
            const hasHtml = email.body_html && email.body_html.trim();
            const hasPlain = email.body_plain && email.body_plain.trim();

            if (!hasHtml && !hasPlain) {
                return '<div class="notice">此邮件无内容</div>';
            }

            if (hasHtml) {
                return `
                    <div class="tabs">
                        <button class="tab active" type="button" onclick="showEmailContentTab('html', this)">HTML 视图</button>
                        ${hasPlain ? '<button class="tab" type="button" onclick="showEmailContentTab(\'plain\', this)">纯文本</button>' : ''}
                        <button class="tab" type="button" onclick="showEmailContentTab('raw', this)">源码</button>
                    </div>
                    <div class="content-panel" id="htmlContent">
                        <iframe id="htmlContentFrame" sandbox="allow-same-origin"></iframe>
                    </div>
                    ${hasPlain ? `<div class="content-panel hidden" id="plainContent"><pre>${escapeHtml(email.body_plain)}</pre></div>` : ''}
                    <div class="content-panel raw-panel hidden" id="rawContent"><pre>${escapeHtml(email.body_html)}</pre></div>
                `;
            }

            return `<div class="content-panel"><pre>${escapeHtml(email.body_plain)}</pre></div>`;
        }

        function showEmailContentTab(type, target) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            target.classList.add('active');
            ['html', 'plain', 'raw'].forEach(key => {
                const node = document.getElementById(key + 'Content');
                if (node) {
                    node.classList.toggle('hidden', key !== type);
                }
            });
        }

        function exportEmails() {
            if (!filteredEmails.length) {
                return;
            }

            const headers = ['主题', '发件人', '日期', '文件夹', '是否已读', '是否有附件'];
            const rows = filteredEmails.map(email => [
                email.subject || '',
                email.from_email || '',
                email.date || '',
                email.folder || '',
                email.is_read ? '是' : '否',
                email.has_attachments ? '是' : '否'
            ]);

            const csv = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');

            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `open_emails_${currentEmailId}_${new Date().toISOString().slice(0, 10)}.csv`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        document.getElementById('unlockForm').addEventListener('submit', submitAccessPassword);
        document.getElementById('emailModal').addEventListener('click', event => {
            if (event.target === event.currentTarget) {
                closeEmailModal();
            }
        });
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') {
                closeEmailModal();
            }
        });
        window.addEventListener('resize', syncEmailSearchState);

        initializePage();
    </script>
</body>
</html>
